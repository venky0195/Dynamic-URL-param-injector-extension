<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 280px;
      padding: 14px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #1a1a2e;
      color: #eee;
    }
    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 14px;
    }
    .header-title {
      font-size: 14px;
      font-weight: 600;
      color: #fff;
    }
    .settings-link {
      font-size: 12px;
      color: #4A90D9;
      cursor: pointer;
      text-decoration: none;
      background: none;
      border: none;
    }
    .settings-link:hover { text-decoration: underline; }

    .toggle-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 12px;
      background: #16213e;
      border-radius: 8px;
      margin-bottom: 10px;
    }
    .toggle-label {
      font-size: 13px;
      color: #ccc;
    }
    .switch {
      position: relative;
      width: 44px;
      height: 24px;
      flex-shrink: 0;
    }
    .switch input { opacity: 0; width: 0; height: 0; }
    .slider {
      position: absolute;
      cursor: pointer;
      inset: 0;
      background: #444;
      border-radius: 24px;
      transition: 0.3s;
    }
    .slider:before {
      content: "";
      position: absolute;
      height: 18px;
      width: 18px;
      left: 3px;
      bottom: 3px;
      background: #fff;
      border-radius: 50%;
      transition: 0.3s;
    }
    input:checked + .slider { background: #4A90D9; }
    input:checked + .slider:before { transform: translateX(20px); }

    .params-preview {
      padding: 6px 10px;
      background: #12122a;
      border-radius: 5px;
      margin-bottom: 8px;
    }
    .params-preview-title {
      font-size: 9px;
      color: #666;
      text-transform: uppercase;
      letter-spacing: 0.3px;
      margin-bottom: 3px;
    }
    .param-chip {
      font-size: 11px;
      color: #4A90D9;
      background: #4A90D922;
      display: inline-block;
      padding: 2px 6px;
      border-radius: 3px;
      margin: 1px 1px;
      font-family: monospace;
      word-break: break-all;
      max-width: 100%;
    }

    .status {
      font-size: 11px;
      text-align: center;
      color: #888;
    }
    .status.active { color: #4A90D9; }
  </style>
</head>
<body>
  <div class="header">
    <span class="header-title">URL Param Injector</span>
    <button class="settings-link" id="open-settings">⚙ Settings</button>
  </div>

  <div class="toggle-row">
    <span class="toggle-label">Injection</span>
    <label class="switch">
      <input type="checkbox" id="toggle">
      <span class="slider"></span>
    </label>
  </div>

  <div class="params-preview" id="params-preview">
    <div class="params-preview-title">Active Params</div>
    <div id="params-chips"></div>
  </div>

  <div class="params-preview" id="hosts-preview">
    <div class="params-preview-title">Target Hosts</div>
    <div id="hosts-chips"></div>
  </div>

  <div class="status" id="status">Loading...</div>
  <script src="popup.js"></script>
</body>
</html>
